<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Profile Banner</title>
  <desc id="desc">Blueprint-style SVG banner inspired by microservices architecture.</desc>

  <!-- Reusable primitives and gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="80" y1="40" x2="1520" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F" />
      <stop offset="1" stop-color="#101A2D" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="520" y1="120" x2="1120" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC" stop-opacity="0.95" />
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#142238" />
      <stop offset="1" stop-color="#0F1728" />
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 H 0 V 40" stroke="#7DD3FC" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.22 0 1 0 0 0.74 0 0 1 0 0.98 0 0 0 0.9 0" result="colored" />
      <feMerge>
        <feMergeNode in="colored" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect width="1600" height="520" rx="36" fill="url(#bgGradient)" />
    <rect x="0.5" y="0.5" width="1599" height="519" rx="35.5" stroke="#7DD3FC" stroke-opacity="0.12" />
    <path d="M1040 0C1200 100 1360 98 1600 40V0H1040Z" fill="#7DD3FC" fill-opacity="0.04" />
    <circle cx="1320" cy="88" r="120" fill="#7DD3FC" fill-opacity="0.05" />
    <circle cx="300" cy="408" r="140" fill="#38BDF8" fill-opacity="0.04" />
  </g>

  <!-- Grid -->
  <g id="grid" opacity="0.95">
    <rect width="1600" height="520" fill="url(#gridPattern)" />
    <path d="M0 260H1600" stroke="#7DD3FC" stroke-opacity="0.08" />
    <path d="M800 0V520" stroke="#7DD3FC" stroke-opacity="0.06" />
  </g>

  <!-- Connections -->
  <g id="connections" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M380 264H470" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M640 200H770" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M860 200V138H1000" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M860 200V290H990" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M860 200V370H1000" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M1180 138H1270" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M1180 290H1270" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M1180 370H1270" stroke="url(#accentGradient)" stroke-width="2" />
    <path d="M1180 370C1260 370 1320 410 1370 450" stroke="url(#accentGradient)" stroke-width="2" stroke-dasharray="4 8" />
  </g>

  <!-- Nodes -->
  <g id="nodes">
    <g transform="translate(120 184)">
      <rect x="0" y="0" width="260" height="160" rx="18" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <rect x="18" y="18" width="224" height="18" rx="9" fill="#7DD3FC" fill-opacity="0.08" />
      <text x="24" y="31" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">API Gateway</text>
      <text x="24" y="70" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">entrada unificada</text>
      <text x="24" y="92" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">roteamento</text>
      <text x="24" y="114" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">segurança</text>
    </g>

    <g transform="translate(470 104)">
      <rect x="0" y="0" width="170" height="80" rx="16" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="33" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">Auth</text>
      <text x="20" y="54" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">tokens</text>
    </g>

    <g transform="translate(470 216)">
      <rect x="0" y="0" width="170" height="80" rx="16" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="33" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">Services</text>
      <text x="20" y="54" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">domínios</text>
    </g>

    <g transform="translate(470 328)">
      <rect x="0" y="0" width="170" height="80" rx="16" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="33" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">Observability</text>
      <text x="20" y="54" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">logs / metrics</text>
    </g>

    <g transform="translate(770 154)">
      <rect x="0" y="0" width="310" height="92" rx="20" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.2" />
      <rect x="20" y="18" width="52" height="52" rx="14" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.2" />
      <path d="M33 46H59" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" />
      <path d="M33 54H59" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" />
      <text x="94" y="43" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="600">RabbitMQ</text>
      <text x="94" y="63" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">event bus</text>
    </g>

    <g transform="translate(1000 114)">
      <rect x="0" y="0" width="220" height="72" rx="16" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="31" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">Customer</text>
      <text x="20" y="52" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">profile data</text>
    </g>

    <g transform="translate(1000 266)">
      <rect x="0" y="0" width="220" height="72" rx="16" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="31" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">Account</text>
      <text x="20" y="52" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">balance rules</text>
    </g>

    <g transform="translate(1000 346)">
      <rect x="0" y="0" width="220" height="72" rx="16" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="31" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">Transaction</text>
      <text x="20" y="52" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">money flow</text>
    </g>

    <g transform="translate(1270 386)">
      <rect x="0" y="0" width="210" height="88" rx="18" fill="url(#nodeFill)" stroke="#7DD3FC" stroke-opacity="0.18" />
      <text x="20" y="34" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600">PostgreSQL</text>
      <text x="20" y="56" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">storage layer</text>
    </g>
  </g>

  <!-- Title -->
  <g id="title">
    <text x="120" y="92" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="44" font-weight="700" letter-spacing="-0.03em">GitHub Profile Premium</text>
    <text x="120" y="128" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="16">backend engineering • architecture • distributed systems</text>
  </g>

  <!-- Decorations -->
  <g id="decorations">
    <path d="M1220 68H1410" stroke="#7DD3FC" stroke-opacity="0.14" />
    <path d="M1220 80H1350" stroke="#7DD3FC" stroke-opacity="0.14" />
    <circle cx="1240" cy="72" r="4" fill="#7DD3FC" fill-opacity="0.7" />
    <circle cx="1262" cy="72" r="4" fill="#7DD3FC" fill-opacity="0.5" />
    <circle cx="1284" cy="72" r="4" fill="#7DD3FC" fill-opacity="0.35" />
    <path d="M1450 82C1490 110 1516 150 1528 200" stroke="#38BDF8" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="5 10" />
    <path d="M1450 82C1490 110 1516 150 1528 200" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1" />
  </g>
</svg>
