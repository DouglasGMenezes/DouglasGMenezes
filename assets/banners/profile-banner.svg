    <g transform="translate(421 57)">
      <rect width="130" height="42" rx="6" fill="#0B1824" stroke="#5FBFEF" stroke-opacity="0.46" />
      <path d="M15 11L23 8L31 11V23C31 28 27 31 23 32C19 31 15 28 15 23V11Z" stroke="#7DD3FC" stroke-width="1.2" />
