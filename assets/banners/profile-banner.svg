<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Profile Banner — Animated</title>
  <desc id="desc">Animated backend architecture banner with flowing data connections between services.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="80" y1="0" x2="1520" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050810" />
      <stop offset="1" stop-color="#0B1424" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="80" y1="60" x2="620" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1F5F9" />
      <stop offset="0.55" stop-color="#A5F3FC" />
      <stop offset="1" stop-color="#C4B5FD" />
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE" stop-opacity="0.15" />
      <stop offset="0.5" stop-color="#67E8F9" stop-opacity="0.95" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="violetLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#818CF8" stop-opacity="0.15" />
      <stop offset="0.5" stop-color="#C4B5FD" stop-opacity="0.95" />
      <stop offset="1" stop-color="#818CF8" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#131D30" />
      <stop offset="1" stop-color="#0D1526" />
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.35" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.30" />
      <stop offset="1" stop-color="#818CF8" stop-opacity="0" />
    </radialGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="sparkGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
    <pattern id="dotGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#7DD3FC" fill-opacity="0.10" />
    </pattern>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#67E8F9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75" />
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#C4B5FD" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75" />
    </marker>

    <style>
      @media (prefers-reduced-motion: no-preference) {
        .flow { stroke-dasharray: 5 15; animation: flow 1.4s linear infinite; }
        .flowSlow { stroke-dasharray: 4 18; animation: flow 2s linear infinite; }
        .spark { animation: sparkMove linear infinite; offset-rotate: 0deg; }
        .pulseDot { animation: pulseDot 2.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
        .pulseBar { animation: pulseBar 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
        .breathe { animation: breathe 5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
        .blinkCursor { animation: blinkCursor 1s steps(1) infinite; }
        .drift { animation: drift linear infinite; }
      }
      @keyframes flow { to { stroke-dashoffset: -40; } }
      @keyframes sparkMove { to { offset-distance: 100%; } }
      @keyframes pulseDot { 0%, 100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 1; transform: scale(1.35); } }
      @keyframes pulseBar { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @keyframes breathe { 0%, 100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.06); } }
      @keyframes blinkCursor { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes drift { from { transform: translateY(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } to { transform: translateY(-60px); opacity: 0; } }
    </style>
  </defs>

  <g id="background">
    <rect width="1600" height="520" rx="32" fill="url(#bgGradient)" />
    <rect x="0.5" y="0.5" width="1599" height="519" rx="31.5" stroke="#7DD3FC" stroke-opacity="0.14" />
    <rect width="1600" height="520" rx="32" fill="url(#dotGrid)" />
    <circle cx="220" cy="90" r="220" fill="url(#glowViolet)" filter="url(#softBlur)" class="breathe" />
    <circle cx="810" cy="265" r="180" fill="url(#glowViolet)" filter="url(#softBlur)" class="breathe" style="animation-delay:-1.5s" />
    <circle cx="1400" cy="440" r="220" fill="url(#glowCyan)" filter="url(#softBlur)" class="breathe" style="animation-delay:-3s" />
  </g>

  <g id="particles" opacity="0.8">
    <circle cx="140" cy="440" r="1.6" fill="#67E8F9" class="drift" style="animation-duration:7s; animation-delay:0s" />
    <circle cx="560" cy="480" r="1.4" fill="#C4B5FD" class="drift" style="animation-duration:9s; animation-delay:-2s" />
    <circle cx="980" cy="460" r="1.8" fill="#67E8F9" class="drift" style="animation-duration:8s; animation-delay:-4s" />
    <circle cx="1300" cy="490" r="1.4" fill="#C4B5FD" class="drift" style="animation-duration:10s; animation-delay:-1s" />
    <circle cx="1500" cy="470" r="1.6" fill="#67E8F9" class="drift" style="animation-duration:6.5s; animation-delay:-3.5s" />
  </g>

  <g id="connections" stroke-linecap="round" fill="none">
    <path id="p1" d="M310 182 L390 182" stroke="url(#violetLine)" stroke-width="1" opacity="0.3" />
    <path d="M310 182 L390 182" class="flow" stroke="url(#violetLine)" stroke-width="1.6" marker-end="url(#arrowViolet)" style="animation-delay:0s" />

    <path d="M310 265 L390 265" stroke="url(#violetLine)" stroke-width="1" opacity="0.3" />
    <path d="M310 265 L390 265" class="flow" stroke="url(#violetLine)" stroke-width="1.6" marker-end="url(#arrowViolet)" style="animation-delay:-0.3s" />

    <path d="M310 348 L390 348" stroke="url(#violetLine)" stroke-width="1" opacity="0.3" />
    <path d="M310 348 L390 348" class="flow" stroke="url(#violetLine)" stroke-width="1.6" marker-end="url(#arrowViolet)" style="animation-delay:-0.6s" />

    <path d="M590 182 C650 182 650 265 690 265" stroke="url(#cyanLine)" stroke-width="1" opacity="0.3" />
    <path d="M590 182 C650 182 650 265 690 265" class="flowSlow" stroke="url(#cyanLine)" stroke-width="1.6" marker-end="url(#arrowCyan)" style="animation-delay:-0.2s" />

    <path d="M590 265 L690 265" stroke="url(#cyanLine)" stroke-width="1" opacity="0.3" />
    <path d="M590 265 L690 265" class="flow" stroke="url(#cyanLine)" stroke-width="1.6" marker-end="url(#arrowCyan)" style="animation-delay:-0.5s" />

    <path d="M590 348 C650 348 650 265 690 265" stroke="url(#cyanLine)" stroke-width="1" opacity="0.3" />
    <path d="M590 348 C650 348 650 265 690 265" class="flowSlow" stroke="url(#cyanLine)" stroke-width="1.6" marker-end="url(#arrowCyan)" style="animation-delay:-0.8s" />

    <path d="M930 265 C970 265 970 182 1030 182" stroke="url(#violetLine)" stroke-width="1" opacity="0.3" />
    <path d="M930 265 C970 265 970 182 1030 182" class="flowSlow" stroke="url(#violetLine)" stroke-width="1.6" marker-end="url(#arrowViolet)" style="animation-delay:-0.1s" />

    <path d="M930 265 L1030 265" stroke="url(#violetLine)" stroke-width="1" opacity="0.3" />
    <path d="M930 265 L1030 265" class="flow" stroke="url(#violetLine)" stroke-width="1.6" marker-end="url(#arrowViolet)" style="animation-delay:-0.4s" />

    <path d="M930 265 C970 265 970 348 1030 348" stroke="url(#violetLine)" stroke-width="1" opacity="0.3" />
    <path d="M930 265 C970 265 970 348 1030 348" class="flowSlow" stroke="url(#violetLine)" stroke-width="1.6" marker-end="url(#arrowViolet)" style="animation-delay:-0.7s" />

    <path id="db1" d="M1130 214 C1130 330 420 360 350 440" stroke="url(#cyanLine)" stroke-width="1" opacity="0.3" />
    <path d="M1130 214 C1130 330 420 360 350 440" class="flowSlow" stroke="url(#cyanLine)" stroke-width="1.6" marker-end="url(#arrowCyan)" style="animation-delay:-0.15s" />

    <path id="db2" d="M1130 297 C1130 380 800 400 750 440" stroke="url(#cyanLine)" stroke-width="1" opacity="0.3" />
    <path d="M1130 297 C1130 380 800 400 750 440" class="flow" stroke="url(#cyanLine)" stroke-width="1.6" marker-end="url(#arrowCyan)" style="animation-delay:-0.55s" />

    <path id="db3" d="M1130 380 C1130 420 1160 425 1150 440" stroke="url(#cyanLine)" stroke-width="1" opacity="0.3" />
    <path d="M1130 380 C1130 420 1160 425 1150 440" class="flowSlow" stroke="url(#cyanLine)" stroke-width="1.6" marker-end="url(#arrowCyan)" style="animation-delay:-0.95s" />
  </g>

  <g id="sparks" filter="url(#sparkGlow)">
    <circle r="2.6" fill="#67E8F9" class="spark" style="offset-path: path('M310 182 L390 182'); animation-duration:1.4s; animation-delay:-0.1s" />
    <circle r="2.6" fill="#C4B5FD" class="spark" style="offset-path: path('M930 265 C970 265 970 182 1030 182'); animation-duration:2s; animation-delay:-0.6s" />
    <circle r="2.6" fill="#67E8F9" class="spark" style="offset-path: path('M1130 214 C1130 330 420 360 350 440'); animation-duration:2.6s; animation-delay:-1.2s" />
    <circle r="2.6" fill="#C4B5FD" class="spark" style="offset-path: path('M590 265 L690 265'); animation-duration:1.4s; animation-delay:-0.9s" />
    <circle r="2.6" fill="#67E8F9" class="spark" style="offset-path: path('M1130 297 C1130 380 800 400 750 440'); animation-duration:2.6s; animation-delay:-0.3s" />
  </g>

  <g id="nodes" font-family="Inter, Segoe UI, sans-serif">
    <g transform="translate(80 150)">
      <rect width="230" height="230" rx="18" fill="url(#cardFill)" stroke="#818CF8" stroke-opacity="0.25" stroke-width="1" />
      <rect x="0" y="0" width="230" height="3" rx="1.5" fill="#A78BFA" class="pulseBar" />
      <circle cx="206" cy="24" r="4" fill="#34D399" class="pulseDot" />
      <text x="24" y="42" fill="#E5EEF8" font-size="17" font-weight="600">API Gateway</text>
      <text x="24" y="88" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">entrada unificada</text>
      <text x="24" y="112" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">roteamento</text>
      <text x="24" y="136" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">segurança</text>
    </g>

    <g transform="translate(390 150)">
      <rect width="200" height="64" rx="14" fill="url(#cardFill)" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1" />
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#67E8F9" class="pulseBar" style="animation-delay:-0.4s" />
      <circle cx="178" cy="20" r="3.5" fill="#34D399" class="pulseDot" style="animation-delay:-0.3s" />
      <text x="20" y="34" fill="#E5EEF8" font-size="15" font-weight="600">Auth</text>
      <text x="20" y="52" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">tokens &amp; sessões</text>
    </g>
    <g transform="translate(390 233)">
      <rect width="200" height="64" rx="14" fill="url(#cardFill)" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1" />
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#67E8F9" class="pulseBar" style="animation-delay:-0.9s" />
      <circle cx="178" cy="20" r="3.5" fill="#34D399" class="pulseDot" style="animation-delay:-0.8s" />
      <text x="20" y="34" fill="#E5EEF8" font-size="15" font-weight="600">Services</text>
      <text x="20" y="52" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">domínios de negócio</text>
    </g>
    <g transform="translate(390 316)">
      <rect width="200" height="64" rx="14" fill="url(#cardFill)" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1" />
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#67E8F9" class="pulseBar" style="animation-delay:-1.4s" />
      <circle cx="178" cy="20" r="3.5" fill="#34D399" class="pulseDot" style="animation-delay:-1.3s" />
      <text x="20" y="34" fill="#E5EEF8" font-size="15" font-weight="600">Observability</text>
      <text x="20" y="52" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">logs &amp; métricas</text>
    </g>

    <g transform="translate(690 195)">
      <rect width="240" height="140" rx="18" fill="url(#cardFill)" stroke="#818CF8" stroke-opacity="0.28" stroke-width="1" />
      <rect x="0" y="0" width="240" height="3" rx="1.5" fill="#A78BFA" class="pulseBar" style="animation-delay:-2s" />
      <circle cx="216" cy="24" r="4" fill="#34D399" class="pulseDot" style="animation-delay:-1.9s" />
      <rect x="24" y="24" width="46" height="46" rx="12" fill="#818CF8" fill-opacity="0.10" stroke="#A78BFA" stroke-opacity="0.35" />
      <path d="M35 46H59" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" />
      <path d="M35 54H59" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" />
      <text x="86" y="47" fill="#E5EEF8" font-size="18" font-weight="600">Message bus</text>
      <text x="24" y="106" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">event streaming</text>
      <text x="24" y="126" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">entrega assíncrona</text>
    </g>

    <g transform="translate(1030 150)">
      <rect width="200" height="64" rx="14" fill="url(#cardFill)" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1" />
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#67E8F9" class="pulseBar" style="animation-delay:-0.2s" />
      <circle cx="178" cy="20" r="3.5" fill="#34D399" class="pulseDot" style="animation-delay:-0.1s" />
      <text x="20" y="34" fill="#E5EEF8" font-size="15" font-weight="600">Customer</text>
      <text x="20" y="52" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">dados de perfil</text>
    </g>
    <g transform="translate(1030 233)">
      <rect width="200" height="64" rx="14" fill="url(#cardFill)" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1" />
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#67E8F9" class="pulseBar" style="animation-delay:-0.7s" />
      <circle cx="178" cy="20" r="3.5" fill="#34D399" class="pulseDot" style="animation-delay:-0.6s" />
      <text x="20" y="34" fill="#E5EEF8" font-size="15" font-weight="600">Account</text>
      <text x="20" y="52" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">regras de saldo</text>
    </g>
    <g transform="translate(1030 316)">
      <rect width="200" height="64" rx="14" fill="url(#cardFill)" stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1" />
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#67E8F9" class="pulseBar" style="animation-delay:-1.2s" />
      <circle cx="178" cy="20" r="3.5" fill="#34D399" class="pulseDot" style="animation-delay:-1.1s" />
      <text x="20" y="34" fill="#E5EEF8" font-size="15" font-weight="600">Transaction</text>
      <text x="20" y="52" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">fluxo financeiro</text>
    </g>

    <g transform="translate(80 440)">
      <rect width="1440" height="60" rx="16" fill="url(#cardFill)" stroke="#818CF8" stroke-opacity="0.25" stroke-width="1" />
      <rect x="0" y="0" width="1440" height="3" rx="1.5" fill="#A78BFA" class="pulseBar" style="animation-delay:-2.4s" />
      <ellipse cx="42" cy="20" rx="16" ry="6" fill="none" stroke="#C4B5FD" stroke-opacity="0.6" stroke-width="1.4" />
      <path d="M26 20V38C26 41.3 33.2 44 42 44C50.8 44 58 41.3 58 38V20" fill="none" stroke="#C4B5FD" stroke-opacity="0.6" stroke-width="1.4" />
      <text x="80" y="26" fill="#E5EEF8" font-size="16" font-weight="600">PostgreSQL</text>
      <text x="80" y="45" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="12">camada de persistência</text>
      <circle cx="1410" cy="24" r="4" fill="#34D399" class="pulseDot" style="animation-delay:-1.6s" />
    </g>
  </g>

  <g id="title" font-family="Inter, Segoe UI, sans-serif">
    <text x="80" y="76" fill="url(#titleGradient)" font-size="42" font-weight="700" letter-spacing="-0.03em">GitHub Profile Premium</text>
    <text x="80" y="106" fill="#94A3B8" font-family="SFMono-Regular, Consolas, monospace" font-size="15">backend engineering • architecture • distributed systems<tspan class="blinkCursor" fill="#67E8F9">_</tspan></text>
  </g>

  <g id="live-badge" font-family="SFMono-Regular, Consolas, monospace">
    <rect x="1382" y="52" width="138" height="30" rx="15" fill="#0D1526" stroke="#34D399" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="1402" cy="67" r="4" fill="#34D399" class="pulseDot" />
    <text x="1416" y="71" fill="#94A3B8" font-size="12">sistema ativo</text>
  </g>
</svg>