<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="320" viewBox="0 0 1600 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">Douglas Menezes - Backend Developer</title>
  <desc id="banner-desc">Technology banner inspired by motherboard circuits and distributed backend architecture, with subtle animated data pulses.</desc>

  <style>
    .label { font-family: Inter, Segoe UI, sans-serif; fill: #A7B6C8; font-size: 11px; letter-spacing: 0.08em; }
    .mono { font-family: SFMono-Regular, Consolas, monospace; fill: #8FA2B8; font-size: 11px; }
    .card-title { font-family: Inter, Segoe UI, sans-serif; fill: #E7F3FF; font-size: 13px; font-weight: 700; }
    .small-title { font-family: Inter, Segoe UI, sans-serif; fill: #D8E8F8; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }
    .trace {
    stroke-dasharray: 4 8;
    animation: traceFlow 7s linear infinite;
    }
    .trace-slow {
    stroke-dasharray: 2 10;
    animation: traceFlow 12s linear infinite;
    }
    .packet {
    filter: url(#packetGlow);
    opacity: 0.85;
    }
    .blink {
    animation: blink 3.2s ease-in-out infinite;
    }
    .blink-alt {
    animation: blink 4.4s ease-in-out infinite;
    }
    .node-glow {
    animation: nodeGlow 5s ease-in-out infinite;
    }
    .center-code {
    animation: centerPulse 6s ease-in-out infinite;
    transform-origin: center;
    transform-box: fill-box;
    }
    @keyframes traceFlow {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -120; }
    }
    @keyframes blink {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
    }
    @keyframes nodeGlow {
    0%, 100% { filter: drop-shadow(0 0 0 rgba(56, 189, 248, 0)); }
    50% { filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.45)); }
    }
    @keyframes centerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.035); }
    }
    @media (prefers-reduced-motion: reduce) {
    .trace,
    .trace-slow,
    .blink,
    .blink-alt,
    .node-glow,
    .center-code {
    animation: none !important;
    }
    animateMotion {
    display: none;
    }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101B" />
      <stop offset="0.52" stop-color="#0A141E" />
      <stop offset="1" stop-color="#07101A" />
    </linearGradient>
    <radialGradient id="centerLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 150) scale(340 150)">
      <stop stop-color="#1F6D8F" stop-opacity="0.22" />
      <stop offset="1" stop-color="#1F6D8F" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="blueStroke" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2DD4FF" stop-opacity="0.25" />
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.95" />
      <stop offset="1" stop-color="#2DD4FF" stop-opacity="0.25" />
    </linearGradient>
    <linearGradient id="orangeStroke" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F97316" stop-opacity="0.18" />
      <stop offset="0.5" stop-color="#FB923C" stop-opacity="0.9" />
      <stop offset="1" stop-color="#F97316" stop-opacity="0.18" />
    </linearGradient>
    <pattern id="dotGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#8BA3B7" fill-opacity="0.16" />
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="packetGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.74 0 0 0 0 1 0 0 0 0.85 0" result="colored" />
      <feMerge>
        <feMergeNode in="colored" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <path id="p-api-auth" d="M357 119H396V73H421" />
    <path id="p-api-user" d="M357 136H421" />
    <path id="p-api-notify" d="M357 153H396V207H421" />
    <path id="p-card-broker" d="M1180 74H1234V128H1260" />
    <path id="p-account-broker" d="M1180 136H1260" />
    <path id="p-credit-broker" d="M1180 204H1234V156H1260" />
    <path id="p-broker-data" d="M1340 141H1425" />
  </defs>

  <rect width="1600" height="320" rx="14" fill="url(#bg)" />
  <rect width="1600" height="320" rx="14" fill="url(#centerLight)" />
  <rect x="0.5" y="0.5" width="1599" height="319" rx="13.5" stroke="#7DD3FC" stroke-opacity="0.18" />
  <rect x="20" y="20" width="1560" height="240" rx="4" stroke="#516678" stroke-opacity="0.38" />
  <rect x="20" y="20" width="1560" height="240" fill="url(#dotGrid)" opacity="0.7" />

  <g id="ambient-traces" stroke-linecap="round" stroke-linejoin="round">
    <path class="trace-slow" d="M1160 36H1240V63H1300V99" stroke="#F97316" stroke-opacity="0.35" />
    <path class="trace-slow" d="M1355 205H1288V236H1190" stroke="#F97316" stroke-opacity="0.35" />
    <path class="trace-slow" d="M116 245H262V272H760" stroke="#38BDF8" stroke-opacity="0.22" />
    <path class="trace-slow" d="M1380 32H1510V49H1560" stroke="#38BDF8" stroke-opacity="0.28" />
    <circle cx="1560" cy="49" r="2" fill="#7DD3FC" fill-opacity="0.8" class="blink" />
    <circle cx="1300" cy="99" r="2.3" fill="#FB923C" fill-opacity="0.8" class="blink-alt" />
    <circle cx="1190" cy="236" r="2.3" fill="#FB923C" fill-opacity="0.7" class="blink" />
  </g>

  <g id="clients">
    <rect x="38" y="48" width="106" height="188" rx="7" fill="#0A141F" stroke="#60798D" stroke-opacity="0.35" />
    <text x="58" y="61" class="small-title" fill="#8FB9FF">CLIENTS</text>
