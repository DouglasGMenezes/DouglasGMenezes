  </g>

  <g id="center-title">
    <g transform="translate(770 40)">
      <g class="center-code">
        <circle cx="30" cy="30" r="22" fill="#092033" stroke="#38BDF8" stroke-width="2" filter="url(#softGlow)" />
        <path d="M22 31L16 26L22 21M38 21L44 26L38 31M27 36L34 18" stroke="#65D7FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
    <text x="800" y="134" text-anchor="middle" fill="#F2F7FB" font-family="Inter, Segoe UI, sans-serif" font-size="45" font-weight="800">Douglas Menezes</text>
    <text x="800" y="166" text-anchor="middle" fill="#38BDF8" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="800">Backend Developer</text>
    <text x="800" y="192" text-anchor="middle" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="600">Building reliable backend systems,</text>
    <text x="800" y="214" text-anchor="middle" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="600">one service at a time.</text>
    <text x="800" y="240" text-anchor="middle" class="mono">Java    Spring Boot    Microservices    Cloud    Clean Architecture</text>
  </g>

