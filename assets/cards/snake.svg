<svg xmlns="http://w3.org" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definição de Gradientes e Estilos -->
  <defs>
    <!-- Gradiente para o corpo da cobra (Tom tecnológico/neon) -->
    <linearGradient id="snakeSkin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    
    <!-- Sombra projetada para dar profundidade -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Corpo da Cobra em Curva S (Preenchimento transparente, apenas a linha grossa) -->
  <path d="M 50,85 
           C 20,85 20,55 50,55 
           C 80,55 80,25 50,25" 
        fill="none" 
        stroke="url(#snakeSkin)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#dropShadow)" />

  <!-- Língua Bífida (Saindo da cabeça) -->
  <path d="M 50,21 L 50,13 M 50,13 L 46,9 M 50,13 L 54,9" 
        fill="none" 
        stroke="#ff3366" 
        stroke-width="2" 
        stroke-linecap="round" />

  <!-- Cabeça da Cobra -->
  <path d="M 44,27 C 42,19 58,19 56,27 Z" 
        fill="url(#snakeSkin)" 
        filter="url(#dropShadow)" />

  <!-- Olhos (Estilo minimalista/brilhante) -->
  <circle cx="47" cy="23" r="1.5" fill="#fff" />
  <circle cx="53" cy="23" r="1.5" fill="#fff" />
</svg>
