<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contribution Snake</title>
  <desc id="desc">Static placeholder for the contribution snake generated by GitHub Actions.</desc>
  <defs>
    <pattern id="snakeGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#0B1020" />
      <path d="M24 0H0V24" stroke="#7DD3FC" stroke-opacity="0.08" />
    </pattern>
    <linearGradient id="snake" x1="120" y1="40" x2="1060" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC" />
      <stop offset="1" stop-color="#38BDF8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="220" rx="24" fill="#0B1020" />
  <rect width="1200" height="220" rx="24" fill="url(#snakeGrid)" />
  <path d="M88 150C130 110 175 92 230 92C282 92 312 118 348 118C390 118 418 88 468 88C524 88 562 128 612 128C664 128 690 98 734 98C784 98 822 130 872 130C926 130 960 100 1016 100C1068 100 1100 122 1120 146" stroke="url(#snake)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="88" cy="150" r="12" fill="#7DD3FC" />
  <circle cx="1120" cy="146" r="12" fill="#38BDF8" />
  <text x="40" y="48" fill="#E5EEF8" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700">Contribution Snake</text>
  <text x="40" y="76" fill="#93A4BA" font-family="SFMono-Regular, Consolas, monospace" font-size="12">updated automatically by GitHub Actions</text>
</svg>
