        <style>
            @media (prefers-reduced-motion: no-preference) {
            .radarRing {
            animation: radar 2.4s cubic-bezier(0.2,0.6,0.3,1) infinite;
            transform-origin: 348px 169.7px;
            transform-box: view-box;
            }
            .pulseDot { animation: pulseDot 2.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
            .pulseBar { animation: pulseBar 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
            }
            .contactLink .linkHitbox { transition: fill-opacity 180ms ease, stroke-opacity 180ms ease; }
            .contactLink .linkText { transition: fill 180ms ease; }
            .contactLink:hover .linkHitbox,
            .contactLink:focus .linkHitbox { fill-opacity: 0.08; stroke-opacity: 0.22; }
            .contactLink:hover .linkText,
            .contactLink:focus .linkText { fill: #A7F3D0; }
            @keyframes radar { 0% { transform: scale(0.3); opacity: 0.9; } 100% { transform: scale(3.6); opacity: 0; } }
            @keyframes pulseDot { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
            @keyframes pulseBar { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
        </style>
