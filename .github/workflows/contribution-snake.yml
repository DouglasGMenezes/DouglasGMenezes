name: Contribution Snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/cards/contribution-snake.svg
            assets/cards/contribution-snake-dark.svg?palette=github-dark

      - name: Commit snake updates
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/cards; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cards/contribution-snake.svg assets/cards/contribution-snake-dark.svg
          git commit -m "chore: update contribution snake"
          git push
