name: Atualização de Estatísticas

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render language and activity cards
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/generated
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=${GITHUB_REPOSITORY_OWNER}&theme=github_dark" -o assets/generated/top-languages.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=${GITHUB_REPOSITORY_OWNER}&theme=github_dark" -o assets/generated/commit-language.svg

      - name: Commit statistics updates
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- assets/generated)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated
          git commit -m "chore: update statistics snapshots"
          git push
