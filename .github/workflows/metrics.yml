name: Atualização de Métricas

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render metrics snapshots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/generated
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=${GITHUB_REPOSITORY_OWNER}&theme=github_dark" -o assets/generated/profile-details.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=${GITHUB_REPOSITORY_OWNER}&theme=github_dark" -o assets/generated/github-stats.svg

      - name: Commit metrics updates
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- assets/generated)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated
          git commit -m "chore: update metrics snapshots"
          git push
